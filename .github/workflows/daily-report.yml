name: 每日汽车配件销售日报

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00（UTC 01:00）每天自动运行
  workflow_dispatch:        # 支持在 GitHub 网页上手动触发

permissions:
  contents: write           # 允许 Actions 提交并推送文件

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装项目依赖
        run: npm install

      - name: 安装 Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: 生成日报
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.js

      - name: 提交并推送报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ index.html
          git diff --cached --quiet && echo "⏭ 今日已有报告，跳过提交" && exit 0
          git commit -m "chore: 自动生成日报 $(date +%Y-%m-%d)"
          git push
